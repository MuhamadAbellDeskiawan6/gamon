<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Gamon Tawing</title>
 <style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    text-align: center;
    background: linear-gradient(180deg, #060811 0%, #0f172a 15%, #1e293b 55%, #334155 100%);
    overflow-x: hidden;
    margin: 0;
    padding: 0 0 140px;
    min-height: 100vh;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 2% 2%, rgba(255,255,255,0.95) 1.6px, transparent 0),
      radial-gradient(circle at 15% 3%, rgba(255,255,255,0.8) 1px, transparent 0),
      radial-gradient(circle at 5% 10%, rgba(255,255,255,0.95) 1.6px, transparent 0),
      radial-gradient(circle at 15% 20%, rgba(255,255,255,0.8) 1px, transparent 0),
      radial-gradient(circle at 25% 5%, rgba(255,255,255,0.9) 1.3px, transparent 0),
      radial-gradient(circle at 35% 18%, rgba(255,255,255,0.75) 1px, transparent 0),
      radial-gradient(circle at 50% 8%, rgba(255,255,255,0.85) 1.4px, transparent 0),
      radial-gradient(circle at 68% 12%, rgba(255,255,255,0.9) 1.5px, transparent 0),
      radial-gradient(circle at 82% 5%, rgba(255,255,255,0.65) 1px, transparent 0),
      radial-gradient(circle at 12% 8%, rgba(255,255,255,0.85) 1px, transparent 0),
      radial-gradient(circle at 28% 12%, rgba(255,255,255,0.8) 1px, transparent 0),
      radial-gradient(circle at 45% 7%, rgba(255,255,255,0.9) 1.2px, transparent 0),
      radial-gradient(circle at 58% 10%, rgba(255,255,255,0.8) 1px, transparent 0),
      radial-gradient(circle at 72% 6%, rgba(255,255,255,0.9) 1.1px, transparent 0),
      radial-gradient(circle at 92% 9%, rgba(255,255,255,0.7) 1px, transparent 0),
      radial-gradient(circle at 30% 2%, rgba(255,255,255,0.9) 1.2px, transparent 0),
      radial-gradient(circle at 60% 4%, rgba(255,255,255,0.85) 1.3px, transparent 0),
      radial-gradient(circle at 85% 1%, rgba(255,255,255,0.7) 1px, transparent 0),
      radial-gradient(circle at 10% 40%, rgba(255,255,255,0.9) 1.3px, transparent 0),
      radial-gradient(circle at 22% 55%, rgba(255,255,255,0.7) 1px, transparent 0),
      radial-gradient(circle at 42% 32%, rgba(255,255,255,0.95) 1.3px, transparent 0),
      radial-gradient(circle at 60% 45%, rgba(255,255,255,0.75) 1px, transparent 0),
      radial-gradient(circle at 77% 28%, rgba(255,255,255,0.85) 1.2px, transparent 0),
      radial-gradient(circle at 90% 18%, rgba(255,255,255,0.65) 0.9px, transparent 0),
      radial-gradient(circle at 5% 70%, rgba(255,255,255,0.8) 1px, transparent 0),
      radial-gradient(circle at 20% 85%, rgba(255,255,255,0.5) 0.8px, transparent 0),
      radial-gradient(circle at 40% 80%, rgba(255,255,255,0.6) 1px, transparent 0),
      radial-gradient(circle at 65% 88%, rgba(255,255,255,0.65) 1px, transparent 0),
      radial-gradient(circle at 85% 75%, rgba(255,255,255,0.85) 1.3px, transparent 0),
      radial-gradient(circle at 50% 50%, rgba(255,255,255,0.95) 1.5px, transparent 0);
    opacity: 0.96;
    pointer-events: none;
    z-index: 2;
  }

  body::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 20% 30%, rgba(89, 107, 255, 0.18) 0%, transparent 28%),
                radial-gradient(circle at 70% 25%, rgba(190, 78, 255, 0.14) 0%, transparent 26%),
                radial-gradient(circle at 40% 70%, rgba(56, 189, 248, 0.12) 0%, transparent 30%);
    z-index: 1;
    pointer-events: none;
  }

  h1 {
    margin-top: 80px;
    margin-bottom: 0;
    font-size: 3em;
    color: white;
    text-shadow: 0 0 20px rgba(255,255,255,0.5);
    z-index: 10;
    position: relative;
  }

  button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #8b5cf6, #6366f1);
    color: white;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
    transition: all 0.3s ease;
    z-index: 10;
    position: relative;
    margin: 30px 0 0 0;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 25px rgba(139, 92, 246, 0.6);
  }

  .floating {
    position: absolute;
    background: rgba(255, 255, 255, 0.1);
    padding: 12px 16px;
    border-radius: 16px;
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    
    width: auto;
    min-width: 150px;
    max-width: 220px;
    
    /* --- FITUR SCROLL --- */
    max-height: 200px;    /* Batas tinggi kartu */
    overflow-y: auto;     /* Munculkan scroll jika teks kepanjangan */
    /* -------------------- */
    
    box-sizing: border-box;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white;
    
    text-align: center; 
    display: flex;
    flex-direction: column;
    /* Hilangkan justify-content: center agar scroll mulai dari atas */
    align-items: center;
    gap: 6px;

    white-space: pre-wrap;
    word-break: break-word;
    cursor: grab;
    animation: fadeIn 0.8s ease, floatSoft 6s ease-in-out infinite;
    transition: transform 0.3s, box-shadow 0.3s;
    user-select: none;
    touch-action: pan-y; /* Izinkan scroll vertikal dengan sentuhan */
  user-select: none;
  }

  /* Bikin scrollbar-nya jadi tipis dan estetik */
  .floating::-webkit-scrollbar {
    width: 4px;
  }
  .floating::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.2);
    border-radius: 10px;
  }

  /* Gaya untuk Nama/Tujuan agar lebih rapi */
.floating .meta {
    font-size: 13px; /* Ukuran sedikit lebih besar agar bold enak dilihat */
    opacity: 0.9;
    margin-bottom: 4px;
    line-height: 1.2;
  }

  .floating .message {
    font-size: 14px;
    line-height: 1.5;
    font-weight: 400;
    font-style: italic; /* Memberi kesan kutipan/pesan */
    color: rgba(255, 255, 255, 0.95);
  }

  .floating:hover {
    transform: scale(1.05);
    background: rgba(255, 255, 255, 0.15);
    border-color: rgba(255, 255, 255, 0.4);
  }

  .floating.dragging {
    animation: none;
    cursor: grabbing;
    opacity: 0.98;
    touch-action: none;
  }

 /* Mencegah kartu terseret saat menekan kontrol audio & perbaiki kursor */
.floating audio {
  position: relative;
  z-index: 20;
  cursor: pointer; /* Ubah agar user tahu ini bisa diklik */
  outline: none;
  width: 100%;
  height: auto;
  min-height: 30px;
}

  #container {
    position: absolute;
    top: 320px;
    left: 0;
    right: 0;
    width: 100%;
    bottom: 120px;
    overflow: hidden;
  }

  footer {
    position: absolute;
    bottom: 18px;
    width: 100%;
    text-align: center;
    z-index: 10;
    font-size: 14px;
    color: rgba(255,255,255,0.6);
  }

  footer a {
    color: rgba(255,255,255,0.8);
    text-decoration: none;
    transition: color 0.3s ease;
  }

  footer a:hover {
    color: rgba(255,255,255,1);
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: scale(0.85);
    }
    to {
      opacity: 1;
      transform: scale(1);
    }
  }

  /* ✨ INI YANG BIKIN "MELAYANG HALUS" */
  @keyframes floatSoft {
    0% {
      transform: translate(0px, 0px);
    }
    25% {
      transform: translate(3px, -4px);
    }
    50% {
      transform: translate(-3px, 2px);
    }
    75% {
      transform: translate(2px, 3px);
    }
    100% {
      transform: translate(0px, 0px);
    }
  }
  .music-player {
    position: fixed;
    bottom: 84px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center; /* Menjaga vertikal tetap di tengah */
    justify-content: space-between;
    gap: 14px;
    padding: 10px 18px; /* Sedikit diperlebar agar lebih lega */
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.18);
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    color: white;
    font-size: 13px;
    z-index: 999;
    animation: floatMusic 5.5s ease-in-out infinite;
    min-width: 240px;
    max-width: 300px;
  }

  .music-info {
    opacity: 0.85;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    text-align: left;
    margin: 0;
    max-width: 190px;
  }

  #musicToggle {
    margin: 0;
    min-width: 42px;
    min-height: 42px;
    width: 42px;
    height: 42px;
    padding: 0;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
  }

  #musicToggle:hover {
    transform: scale(1.07);
    background: rgba(255,255,255,0.18);
    box-shadow: 0 0 14px rgba(255,255,255,0.18);
  }

  .music-icon {
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 8px 0 8px 13px;
    border-color: transparent transparent transparent white;
    transition: all 0.2s ease;
  }

  #musicToggle.playing .music-icon {
    width: 12px;
    height: 16px;
    border: none;
    position: relative;
  }

  #musicToggle.playing .music-icon::before,
  #musicToggle.playing .music-icon::after {
    content: '';
    position: absolute;
    width: 3px;
    height: 16px;
    background: white;
    border-radius: 1px;
  }

  #musicToggle.playing .music-icon::before {
    left: 0;
  }

  #musicToggle.playing .music-icon::after {
    right: 0;
  }

  @keyframes floatMusic {
    0% { transform: translateX(-50%) translateY(0px); }
    50% { transform: translateX(-50%) translateY(-4px); }
    100% { transform: translateX(-50%) translateY(0px); }
  }

  @media (max-width: 700px) {
    body {
      padding-bottom: 180px;
    }

    h1 {
      margin-top: 50px;
      font-size: 2.2rem;
    }

    button {
      padding: 12px 22px;
      font-size: 16px;
      margin-top: 24px;
    }

  .floating {
      width: auto;         /* Kembalikan ke otomatis */
      min-width: 120px;    /* Minimal lebar di HP */
      max-width: 180px;    /* Maksimal lebar di HP */
      padding: 10px 14px;
    }

    #container {
      top: 260px;
      bottom: 140px;
    }

    .music-player {
      bottom: 120px;
      min-width: 200px;
      max-width: 92%;
      padding: 10px 12px;
    }

    .music-info {
      max-width: 140px;
      font-size: 12px;
    }

    footer {
      bottom: 12px;
      font-size: 12px;
    }
  }
  .love-section {
  margin-top: 8px;
}

.love-btn {
  background: rgba(255,255,255,0.1);
  border: none;
  padding: 6px 10px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  font-size: 13px;
}

.love-btn:hover {
  background: rgba(255,255,255,0.2);
}

.love-btn.liked {
  background: rgba(239, 68, 68, 0.3);
}
</style>
</head>
<body>

  <h1>💔 Gamon Tawing</h1>
  <button onclick="location.href='submit.html'">
  Sampaikan Gamonmu
</button>

  <div id="container"></div>

  <footer>
    © 2026 <a href="#">Fullmoon</a> - Gamon Tawing
  </footer>

  <div class="music-player">
    <div class="music-info">
      Aku Jeje - Lihat Kebunku (Taman Bunga)
    </div>

    <button id="musicToggle" aria-label="Toggle music">
      <span class="music-icon"></span>
    </button>

    <audio id="bgMusic" loop>
      <source src="music.mp3" type="audio/mpeg">
  </audio>
</div>

<script type="module">
//music
const music = document.getElementById("bgMusic");
const btn = document.getElementById("musicToggle");

let isPlaying = false;

btn.addEventListener("click", () => {
  if (isPlaying) {
    music.pause();
    btn.classList.remove("playing");
  } else {
    music.play();
    btn.classList.add("playing");
  }
  isPlaying = !isPlaying;
});

// Hapus auto play global agar klik kartu tidak memicu musik.
//music

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  onSnapshot, 
  query, 
  orderBy, 
  limit,
  doc,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC247K8yyL67aWV95KNQy8CkMZsjgGCudQ",
  authDomain: "gamon-tawing.firebaseapp.com",
  projectId: "gamon-tawing",
  storageBucket: "gamon-tawing.appspot.com",
  messagingSenderId: "370162915989",
  appId: "1:370162915989:web:76779062da83aa0c5c999c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("container");

// Query Firestore for the latest 30 messages
const q = query(
  collection(db, "gamon"),
  orderBy("waktu", "desc"),
  limit(30)
);

onSnapshot(q, (snapshot) => {
  container.innerHTML = "";

  // For collision avoidance, but allow more density
  let usedPositions = [];
  let currentZIndex = 1;

  // Ambil data dari localStorage
let likedPosts = JSON.parse(localStorage.getItem("likedPosts")) || [];

snapshot.forEach(item => {
    // Di dalam snapshot.forEach(doc => { ...
const data = item.data();
if (!data.pesan) return;

const div = document.createElement("div");
div.className = "floating";

const nama = data.nama ? escapeHtml(data.nama) : "Seseorang";
const tujuan = data.tujuan ? escapeHtml(data.tujuan) : "-";
const pesan = data.pesan ? escapeHtml(data.pesan) : "";

// Gunakan Base64 langsung sebagai source jika ada
const audioHtml = data.audioUrl 
    ? `<audio controls playsinline preload="metadata" src="${data.audioUrl}" style="width: 100%; margin-top: 8px;">
       </audio>` 
    : "";

div.innerHTML = `
    <div class="meta"><strong>${nama}</strong> ke <strong>${tujuan}</strong></div>
    <div class="message">"${pesan}"</div>
    ${audioHtml}

    <div class="love-section">
        <button class="love-btn" data-id="${item.id}">
            ❤️ <span class="love-count">${data.likes || 0}</span>
        </button>
    </div>
`;
    // 1. Append dulu ke container supaya punya dimensi (width/height)
    container.appendChild(div);

    const loveBtn = div.querySelector(".love-btn");
    const vnAudio = div.querySelector("audio");
    const postId = item.id;

    if (vnAudio) {
      vnAudio.addEventListener("play", () => {
        if (isPlaying) {
          music.pause();
          btn.classList.remove("playing");
          isPlaying = false;
        }
      });
      vnAudio.addEventListener("pointerdown", (event) => {
        event.stopPropagation();
      });
      vnAudio.addEventListener("click", (event) => {
        event.stopPropagation();
      });
    }



if (likedPosts.includes(postId)) {
  loveBtn.classList.add("liked");
  loveBtn.disabled = true;
  
}

loveBtn.addEventListener("click", async () => {
  if (likedPosts.includes(postId)) {
    alert("Kamu sudah kasih love 💔");
    return;
  }

  try {
    const postRef = doc(db, "gamon", postId);

    await updateDoc(postRef, {
      likes: increment(1)
    });

    likedPosts.push(postId);
    localStorage.setItem("likedPosts", JSON.stringify(likedPosts));

    loveBtn.classList.add("liked");

    // ✅ animasi di sini
    loveBtn.style.transform = "scale(1.2)";
    setTimeout(() => {
      loveBtn.style.transform = "scale(1)";
    }, 150);

    const count = loveBtn.querySelector(".love-count");
    count.textContent = parseInt(count.textContent) + 1;

  } catch (err) {
    console.error(err);
    alert("Gagal like 😢");
  }
});

    // 2. Ambil ukuran container dan popup yang baru saja dibuat
    const containerWidth = container.offsetWidth;
    const containerHeight = container.offsetHeight;
    const popupWidth = div.offsetWidth;
    const popupHeight = div.offsetHeight;

    // 3. Hitung batas maksimal agar tidak keluar tembok
    const maxLeftPx = Math.max(containerWidth - popupWidth - 20, 0);
    const maxTopPx = Math.max(containerHeight - popupHeight - 20, 0);

    let topPx, leftPx, tries = 0;
    do {
      topPx = Math.random() * maxTopPx;
      leftPx = Math.random() * maxLeftPx;
      tries++;
    } while (
      usedPositions.some(pos =>
        Math.abs(pos.top - topPx) < 80 && // Jarak antar popup vertikal
        Math.abs(pos.left - leftPx) < 80  // Jarak antar popup horizontal
      ) && tries < 30
    );

    usedPositions.push({ top: topPx, left: leftPx });
    div.style.top = topPx + "px";
    div.style.left = leftPx + "px";

    // --- Bagian event listener pointerdown tetap sama di bawahnya ---
   // --- Bagian event listener pointerdown yang diperbaiki ---
div.addEventListener("pointerdown", (e) => {
  // CEK: Jika yang diklik adalah elemen interaktif di dalam kartu, biarkan event normal berjalan
  if (e.target.closest("audio") || e.target.closest("button") || e.target.closest("a") || e.target.closest("input") || e.target.closest("textarea")) {
    return; // Keluar dari fungsi, biarkan kontrol tersebut bekerja normal
  }

  const rect = div.getBoundingClientRect();
  const clickX = e.clientX - rect.left;
  const clickY = e.clientY - rect.top;
  const resizeZone = 20;

  if (clickX > rect.width - resizeZone && clickY > rect.height - resizeZone) {
    return;
  }

  // Hanya preventDefault saat mulai drag kartu, bukan saat klik audio atau tombol
  e.preventDefault();

  // ... (Sisa kode drag lainnya tetap sama)
      div.classList.add("dragging");
      div.style.zIndex = ++currentZIndex;
      div.setPointerCapture(e.pointerId);

      const startX = e.clientX;
      const startY = e.clientY;
      const startLeft = parseFloat(div.style.left) || 0;
      const startTop = parseFloat(div.style.top) || 0;

      const onMove = (moveEvent) => {
        const dx = moveEvent.clientX - startX;
        const dy = moveEvent.clientY - startY;
        const containerRect = container.getBoundingClientRect();
        const maxLeft = Math.max(containerRect.width - div.offsetWidth, 0);
        const maxTop = Math.max(containerRect.height - div.offsetHeight, 0);
        const newLeft = Math.min(Math.max(startLeft + dx, 0), maxLeft);
        const newTop = Math.min(Math.max(startTop + dy, 0), maxTop);

        div.style.left = newLeft + "px";
        div.style.top = newTop + "px";
      };

      const endDrag = (event) => {
        div.classList.remove("dragging");
        div.releasePointerCapture(e.pointerId);
        window.removeEventListener("pointermove", onMove);
        window.removeEventListener("pointerup", endDrag);
        window.removeEventListener("pointercancel", endDrag);
      };

      window.addEventListener("pointermove", onMove);
      window.addEventListener("pointerup", endDrag);
      window.addEventListener("pointercancel", endDrag);
    });
  });
});

// Simple HTML escape to prevent XSS
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function goToSubmit() {
  window.location.href = "submit.html";
}
</script>

</body>
</html>
