<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Gamon Tawing</title>
 <style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    text-align: center;
    background: linear-gradient(180deg, #060811 0%, #0f172a 15%, #1e293b 55%, #334155 100%);
    overflow-x: hidden;
    margin: 0;
    padding: 0 0 140px;
    min-height: 100vh;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 2% 2%, rgba(255,255,255,0.95) 1.6px, transparent 0),
      radial-gradient(circle at 15% 3%, rgba(255,255,255,0.8) 1px, transparent 0),
      radial-gradient(circle at 5% 10%, rgba(255,255,255,0.95) 1.6px, transparent 0),
      radial-gradient(circle at 15% 20%, rgba(255,255,255,0.8) 1px, transparent 0),
      radial-gradient(circle at 25% 5%, rgba(255,255,255,0.9) 1.3px, transparent 0),
      radial-gradient(circle at 35% 18%, rgba(255,255,255,0.75) 1px, transparent 0),
      radial-gradient(circle at 50% 8%, rgba(255,255,255,0.85) 1.4px, transparent 0),
      radial-gradient(circle at 68% 12%, rgba(255,255,255,0.9) 1.5px, transparent 0),
      radial-gradient(circle at 82% 5%, rgba(255,255,255,0.65) 1px, transparent 0),
      radial-gradient(circle at 12% 8%, rgba(255,255,255,0.85) 1px, transparent 0),
      radial-gradient(circle at 28% 12%, rgba(255,255,255,0.8) 1px, transparent 0),
      radial-gradient(circle at 45% 7%, rgba(255,255,255,0.9) 1.2px, transparent 0),
      radial-gradient(circle at 58% 10%, rgba(255,255,255,0.8) 1px, transparent 0),
      radial-gradient(circle at 72% 6%, rgba(255,255,255,0.9) 1.1px, transparent 0),
      radial-gradient(circle at 92% 9%, rgba(255,255,255,0.7) 1px, transparent 0),
      radial-gradient(circle at 30% 2%, rgba(255,255,255,0.9) 1.2px, transparent 0),
      radial-gradient(circle at 60% 4%, rgba(255,255,255,0.85) 1.3px, transparent 0),
      radial-gradient(circle at 85% 1%, rgba(255,255,255,0.7) 1px, transparent 0),
      radial-gradient(circle at 10% 40%, rgba(255,255,255,0.9) 1.3px, transparent 0),
      radial-gradient(circle at 22% 55%, rgba(255,255,255,0.7) 1px, transparent 0),
      radial-gradient(circle at 42% 32%, rgba(255,255,255,0.95) 1.3px, transparent 0),
      radial-gradient(circle at 60% 45%, rgba(255,255,255,0.75) 1px, transparent 0),
      radial-gradient(circle at 77% 28%, rgba(255,255,255,0.85) 1.2px, transparent 0),
      radial-gradient(circle at 90% 18%, rgba(255,255,255,0.65) 0.9px, transparent 0),
      radial-gradient(circle at 5% 70%, rgba(255,255,255,0.8) 1px, transparent 0),
      radial-gradient(circle at 20% 85%, rgba(255,255,255,0.5) 0.8px, transparent 0),
      radial-gradient(circle at 40% 80%, rgba(255,255,255,0.6) 1px, transparent 0),
      radial-gradient(circle at 65% 88%, rgba(255,255,255,0.65) 1px, transparent 0),
      radial-gradient(circle at 85% 75%, rgba(255,255,255,0.85) 1.3px, transparent 0),
      radial-gradient(circle at 50% 50%, rgba(255,255,255,0.95) 1.5px, transparent 0);
    opacity: 0.96;
    pointer-events: none;
    z-index: 2;
  }

  body::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 20% 30%, rgba(89, 107, 255, 0.18) 0%, transparent 28%),
                radial-gradient(circle at 70% 25%, rgba(190, 78, 255, 0.14) 0%, transparent 26%),
                radial-gradient(circle at 40% 70%, rgba(56, 189, 248, 0.12) 0%, transparent 30%);
    z-index: 1;
    pointer-events: none;
  }

  h1 {
    margin-top: 80px;
    margin-bottom: 0;
    font-size: 3em;
    color: white;
    text-shadow: 0 0 20px rgba(255,255,255,0.5);
    z-index: 10;
    position: relative;
  }

  button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #8b5cf6, #6366f1);
    color: white;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
    transition: all 0.3s ease;
    z-index: 10;
    position: relative;
    margin: 30px 0 0 0;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 25px rgba(139, 92, 246, 0.6);
  }

  .floating {
    position: absolute;
    background: rgba(255,255,255,0.08);
    padding: 12px 16px;
    border-radius: 12px;
    backdrop-filter: blur(12px);
    width: min(220px, calc(100% - 32px));
    box-sizing: border-box;
    box-shadow: 0 2px 15px rgba(0,0,0,0.2);
    border: 1px solid rgba(255,255,255,0.15);
    color: white;

    animation: fadeIn 0.8s ease, floatSoft 6s ease-in-out infinite;
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .floating:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(255,255,255,0.2);
  }

  #container {
    position: absolute;
    top: 320px;
    left: 0;
    right: 0;
    width: 100%;
    bottom: 120px;
    overflow: hidden;
  }

  footer {
    position: absolute;
    bottom: 18px;
    width: 100%;
    text-align: center;
    z-index: 10;
    font-size: 14px;
    color: rgba(255,255,255,0.6);
  }

  footer a {
    color: rgba(255,255,255,0.8);
    text-decoration: none;
    transition: color 0.3s ease;
  }

  footer a:hover {
    color: rgba(255,255,255,1);
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: scale(0.85);
    }
    to {
      opacity: 1;
      transform: scale(1);
    }
  }

  /* ✨ INI YANG BIKIN "MELAYANG HALUS" */
  @keyframes floatSoft {
    0% {
      transform: translate(0px, 0px);
    }
    25% {
      transform: translate(3px, -4px);
    }
    50% {
      transform: translate(-3px, 2px);
    }
    75% {
      transform: translate(2px, 3px);
    }
    100% {
      transform: translate(0px, 0px);
    }
  }
  .music-player {
    position: fixed;
    bottom: 84px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center; /* Menjaga vertikal tetap di tengah */
    justify-content: space-between;
    gap: 14px;
    padding: 10px 18px; /* Sedikit diperlebar agar lebih lega */
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.18);
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    color: white;
    font-size: 13px;
    z-index: 999;
    animation: floatMusic 5.5s ease-in-out infinite;
    min-width: 240px;
    max-width: 300px;
  }

  .music-info {
    opacity: 0.85;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    text-align: left;
    margin: 0;
    max-width: 190px;
  }

  #musicToggle {
    margin: 0;
    min-width: 42px;
    min-height: 42px;
    width: 42px;
    height: 42px;
    padding: 0;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
  }

  #musicToggle:hover {
    transform: scale(1.07);
    background: rgba(255,255,255,0.18);
    box-shadow: 0 0 14px rgba(255,255,255,0.18);
  }

  .music-icon {
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 8px 0 8px 13px;
    border-color: transparent transparent transparent white;
    transition: all 0.2s ease;
  }

  #musicToggle.playing .music-icon {
    width: 12px;
    height: 16px;
    border: none;
    position: relative;
  }

  #musicToggle.playing .music-icon::before,
  #musicToggle.playing .music-icon::after {
    content: '';
    position: absolute;
    width: 3px;
    height: 16px;
    background: white;
    border-radius: 1px;
  }

  #musicToggle.playing .music-icon::before {
    left: 0;
  }

  #musicToggle.playing .music-icon::after {
    right: 0;
  }

  @keyframes floatMusic {
    0% { transform: translateX(-50%) translateY(0px); }
    50% { transform: translateX(-50%) translateY(-4px); }
    100% { transform: translateX(-50%) translateY(0px); }
  }

  @media (max-width: 700px) {
    body {
      padding-bottom: 180px;
    }

    h1 {
      margin-top: 50px;
      font-size: 2.2rem;
    }

    button {
      padding: 12px 22px;
      font-size: 16px;
      margin-top: 24px;
    }

    .floating {
      width: 180px;
      padding: 10px 14px;
    }

    #container {
      top: 260px;
      bottom: 140px;
    }

    .music-player {
      bottom: 120px;
      min-width: 200px;
      max-width: 92%;
      padding: 10px 12px;
    }

    .music-info {
      max-width: 140px;
      font-size: 12px;
    }

    footer {
      bottom: 12px;
      font-size: 12px;
    }
  }
</style>
</head>
<body>

  <h1>💔 Gamon Tawing</h1>
  <button onclick="location.href='submit.html'">
  Sampaikan Gamonmu
</button>

  <div id="container"></div>

  <footer>
    © 2026 <a href="#">Fullmoon</a> - Gamon Tawing
  </footer>

  <div class="music-player">
    <div class="music-info">
      Terbuang Dalam Waktu - Barasuara
    </div>

    <button id="musicToggle" aria-label="Toggle music">
      <span class="music-icon"></span>
    </button>

    <audio id="bgMusic" loop>
      <source src="music.mp3" type="audio/mpeg">
  </audio>
</div>

<script type="module">
//music
const music = document.getElementById("bgMusic");
const btn = document.getElementById("musicToggle");

let isPlaying = false;

btn.addEventListener("click", () => {
  if (isPlaying) {
    music.pause();
    btn.classList.remove("playing");
  } else {
    music.play();
    btn.classList.add("playing");
  }
  isPlaying = !isPlaying;
});

// Auto play setelah interaksi pertama
document.addEventListener("click", () => {
  if (!isPlaying) {
    music.play();
    btn.classList.add("playing");
    isPlaying = true;
  }
}, { once: true });
//music

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC247K8yyL67aWV95KNQy8CkMZsjgGCudQ",
  authDomain: "gamon-tawing.firebaseapp.com",
  projectId: "gamon-tawing",
  storageBucket: "gamon-tawing.appspot.com",
  messagingSenderId: "370162915989",
  appId: "1:370162915989:web:76779062da83aa0c5c999c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("container");

// Query Firestore for the latest 30 messages
const q = query(
  collection(db, "gamon"),
  orderBy("waktu", "desc"),
  limit(30)
);

onSnapshot(q, (snapshot) => {
  container.innerHTML = "";

  // For collision avoidance, but allow more density
  let usedPositions = [];

  snapshot.forEach(doc => {
    const data = doc.data();
    if (!data.pesan || data.pesan.length > 200) return;

    const div = document.createElement("div");
    div.className = "floating";
    div.innerHTML = `
      <strong>${data.nama ? escapeHtml(data.nama) : "Seseorang 💔"}</strong> ke <strong>${data.tujuan ? escapeHtml(data.tujuan) : "-"}</strong><br>
      "${escapeHtml(data.pesan)}"
    `;

    container.appendChild(div);

    const containerRect = container.getBoundingClientRect();
    const popupRect = div.getBoundingClientRect();
    const maxLeftPx = Math.max(containerRect.width - popupRect.width - 16, 0);
    const maxTopPx = Math.max(containerRect.height - popupRect.height - 16, 0);

    let topPx, leftPx, tries = 0;
    do {
      topPx = Math.random() * maxTopPx;
      leftPx = Math.random() * maxLeftPx;
      tries++;
    } while (
      usedPositions.some(pos =>
        Math.abs(pos.top - topPx) < 100 &&
        Math.abs(pos.left - leftPx) < 100
      ) && tries < 30
    );

    usedPositions.push({ top: topPx, left: leftPx });
    div.style.top = topPx + "px";
    div.style.left = leftPx + "px";
  });
});

// Simple HTML escape to prevent XSS
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function goToSubmit() {
  window.location.href = "submit.html";
}
</script>

</body>
</html>
